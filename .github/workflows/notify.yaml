name: LINE Daily Notification

on:
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Get active user IDs from Apps Script
        id: get_users
        run: |
          RESPONSE=$(curl -sL "https://script.google.com/macros/s/AKfycbwc-_yiW_pES560tviBlqgqsXIk_Bjn9u3CRyPy3PHERgKJWPw2CMntunnsx3i-L8GWEg/exec?action=getActiveUsers")
          echo "response=$RESPONSE"
          USER_IDS=$(echo "$RESPONSE" | jq -r '.users[]?')
          echo "user_ids<<EOF" >> $GITHUB_OUTPUT
          echo "$USER_IDS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send LINE Notifications
        run: |
          while IFS= read -r USER_ID; do
            [ -z "$USER_ID" ] && continue
            BODY=$(jq -n \
              --arg to "$USER_ID" \
              --arg text "${{ secrets.NOTIFICATION_MESSAGE }}" \
              '{to: $to, messages: [{type: "text", text: $text}]}')
            curl -s -X POST https://api.line.me/v2/bot/message/push \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
              -d "$BODY"
          done <<< "${{ steps.get_users.outputs.user_ids }}"
